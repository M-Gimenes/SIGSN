# Render Blueprint — apenas o frontend.
# O backend (sigsn) já está provisionado pelo dashboard e não é declarado aqui
# de propósito, para não conflitar com a configuração existente.
#
# Como aplicar:
#   1. Render Dashboard → New + → Blueprint
#   2. Conecte o repositório M-Gimenes/SIGSN
#   3. Render detecta este arquivo e cria o serviço "sigsn-frontend"
#   4. Após o primeiro deploy, a URL fica em https://sigsn-frontend.onrender.com
#      (ou no nome que o Render alocar — pode renomear depois no dashboard)

services:
  - type: web
    runtime: static
    name: sigsn-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        value: https://sigsn.onrender.com
      - key: NODE_VERSION
        value: 20
    # SPA fallback — toda rota desconhecida cai no index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=604800, immutable
