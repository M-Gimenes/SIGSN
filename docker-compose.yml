services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigsn-backend
    env_file:
      - ./backend/.env
    ports:
      - "3333:3333"
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3333}
    container_name: sigsn-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
