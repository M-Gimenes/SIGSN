<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
  --obs-bg:      #04050f;
  --obs-bg2:     #080b1a;
  --obs-bg3:     #0c1028;
  --obs-panel:   rgba(12,18,50,0.9);
  --obs-border:  rgba(100,140,255,0.18);
  --obs-border2: rgba(100,140,255,0.35);
  --obs-accent:  #4f8cff;
  --obs-purple:  #a78bfa;
  --obs-cyan:    #38bdf8;
  --obs-gold:    #f5c842;
  --obs-text:    #e8eaf6;
  --obs-muted:   #8fa3cc;
  --obs-dim:     #4d6490;
  --obs-danger:  #f87171;
  --obs-success: #34d399;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100vh;
  background: var(--obs-bg);
  color: var(--obs-text);
  font-family: 'Raleway', sans-serif;
  overflow-x: hidden;
}

/* ── Starfield ── */
#stars-canvas {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
}

/* ── Sidebar ── */
#sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: 240px;
  background: rgba(8,12,35,0.97);
  border-right: 1px solid var(--obs-border);
  z-index: 100;
  display: flex; flex-direction: column;
  overflow-y: auto;
}

.sidebar-brand {
  padding: 1.5rem 1.25rem;
  border-bottom: 1px solid var(--obs-border);
  text-align: center;
}
.sidebar-brand .brand-icon { font-size: 2rem; display: block; }
.sidebar-brand h1 {
  font-family: 'Cinzel', serif;
  font-size: .875rem; letter-spacing: .2em;
  color: var(--obs-accent); margin: .25rem 0 0;
}
.sidebar-brand small {
  font-size: .6rem; color: var(--obs-dim);
  letter-spacing: .15em; text-transform: uppercase;
}

.sidebar-user {
  padding: .875rem 1.25rem;
  border-bottom: 1px solid var(--obs-border);
  display: flex; align-items: center; gap: .625rem;
}
.user-avatar {
  width: 2.125rem; height: 2.125rem; border-radius: 50%;
  background: linear-gradient(135deg, var(--obs-accent), var(--obs-purple));
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .875rem; flex-shrink: 0;
}
.user-name { font-size: .75rem; font-weight: 600; color: var(--obs-text); }
.user-role {
  font-size: .6rem; color: var(--obs-accent);
  background: rgba(79,140,255,.12); padding: .1rem .375rem;
  border-radius: .25rem; letter-spacing: .1em; display: inline-block;
  margin-top: .125rem;
}

.sidebar-nav { flex: 1; padding: .5rem 0; }
.nav-section-label {
  padding: .5rem 1.125rem .25rem;
  font-size: .6rem; letter-spacing: .15em;
  color: var(--obs-dim); text-transform: uppercase;
}
.sidebar-link {
  display: flex; align-items: center; gap: .625rem;
  padding: .5625rem 1.25rem;
  color: var(--obs-muted); font-size: .8125rem;
  text-decoration: none; cursor: pointer; width: 100%;
  background: transparent; text-align: left;
  border: none; border-left: 3px solid transparent;
  transition: all .15s;
}
.sidebar-link:hover { color: var(--obs-text); background: rgba(79,140,255,.07); }
.sidebar-link.active {
  color: var(--obs-accent); background: rgba(79,140,255,.1);
  border-left-color: var(--obs-accent); font-weight: 600;
}
.sidebar-link .link-icon { font-size: 1rem; width: 1.25rem; text-align: center; }

.sidebar-footer {
  padding: .875rem 1.25rem;
  border-top: 1px solid var(--obs-border);
}

/* ── App wrapper ── */
#app-wrapper { margin-left: 240px; min-height: 100vh; position: relative; z-index: 1; }

/* ── Login ── */
#login-screen {
  position: fixed; inset: 0; z-index: 500;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 40%, #0a1040 0%, #04050f 70%);
}
.login-card {
  background: rgba(8,12,35,.97);
  border: 1px solid var(--obs-border2);
  border-radius: 1rem; padding: 3rem 3.25rem;
  width: 100%; max-width: 420px;
  box-shadow: 0 8px 40px rgba(10,20,80,.7), 0 0 24px rgba(79,140,255,.2);
  position: relative; overflow: hidden;
}
.login-card::before {
  content: ''; position: absolute;
  top: -60px; left: 50%; transform: translateX(-50%);
  width: 200px; height: 120px;
  background: radial-gradient(ellipse, rgba(79,140,255,.18) 0%, transparent 70%);
  pointer-events: none;
}

/* ── Form overrides ── */
.form-control, .form-select {
  background-color: rgba(255,255,255,.04) !important;
  border-color: var(--obs-border) !important;
  color: var(--obs-text) !important;
  font-family: 'Raleway', sans-serif;
}
.form-control:focus, .form-select:focus {
  border-color: var(--obs-accent) !important;
  box-shadow: 0 0 0 .2rem rgba(79,140,255,.15) !important;
  background-color: rgba(255,255,255,.06) !important;
}
.form-label {
  font-size: .6875rem; letter-spacing: .1em;
  color: var(--obs-muted); text-transform: uppercase; margin-bottom: .375rem;
}
.form-select option { background: #0c1028; }
.form-control::placeholder { color: var(--obs-dim) !important; }
textarea.form-control { resize: vertical; min-height: 70px; }

/* ── Buttons ── */
.btn-obs {
  font-family: 'Raleway', sans-serif; font-weight: 600;
  font-size: .8125rem; letter-spacing: .075em; text-transform: uppercase;
  transition: all .2s; border: none;
}
.btn-obs-primary {
  background: linear-gradient(135deg, var(--obs-accent), var(--obs-purple));
  color: #fff; box-shadow: 0 4px 20px rgba(79,140,255,.25);
}
.btn-obs-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(79,140,255,.4); color: #fff; }
.btn-obs-secondary {
  background: rgba(255,255,255,.07); border: 1px solid var(--obs-border) !important;
  color: var(--obs-muted);
}
.btn-obs-secondary:hover { background: rgba(255,255,255,.12); color: var(--obs-text); }
.btn-obs-danger {
  background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.25) !important;
  color: var(--obs-danger);
}
.btn-obs-danger:hover { background: rgba(248,113,113,.2); color: var(--obs-danger); }

/* ── Page header ── */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.75rem;
}
.page-heading {
  font-family: 'Cinzel', serif; font-size: 1.25rem;
  font-weight: 600; color: var(--obs-text); letter-spacing: .05em; margin: 0;
}
.page-sub { font-size: .75rem; color: var(--obs-muted); margin-top: .25rem; }

/* ── Stat cards ── */
.stat-card {
  background: var(--obs-panel);
  border: 1px solid var(--obs-border); border-radius: 1rem;
  padding: 1.375rem 1.5rem; position: relative; overflow: hidden;
  transition: border-color .2s;
}
.stat-card:hover { border-color: var(--obs-border2); }
.stat-card::before {
  content: ''; position: absolute;
  top: -1.25rem; right: -1.25rem;
  width: 5rem; height: 5rem; border-radius: 50%;
  background: radial-gradient(circle, var(--card-glow, rgba(79,140,255,.15)) 0%, transparent 70%);
}
.stat-label { font-size: .625rem; letter-spacing: .15em; color: var(--obs-dim); text-transform: uppercase; }
.stat-value { font-family: 'Cinzel', serif; font-size: 2rem; font-weight: 700; line-height: 1.2; margin: .375rem 0 .25rem; }
.stat-description { font-size: .6875rem; color: var(--obs-muted); }
.stat-icon { position: absolute; top: 1.25rem; right: 1.375rem; font-size: 1.625rem; opacity: .45; }

/* ── Panel ── */
.obs-panel {
  background: var(--obs-panel);
  border: 1px solid var(--obs-border); border-radius: 1rem; overflow: hidden;
}
.obs-panel-header {
  padding: 1rem 1.375rem; border-bottom: 1px solid var(--obs-border);
  display: flex; align-items: center; justify-content: space-between; gap: .75rem;
}
.obs-panel-title {
  font-family: 'Cinzel', serif; font-size: .875rem;
  letter-spacing: .05em; margin: 0; font-weight: 600;
}
.panel-footer {
  padding: .625rem 1.125rem; font-size: .6875rem;
  color: var(--obs-dim); border-top: 1px solid var(--obs-border);
}

/* ── Table ── */
.obs-table { width: 100%; border-collapse: collapse; margin: 0; }
.obs-table thead tr { background: rgba(79,140,255,.06); }
.obs-table th {
  padding: .75rem 1.125rem;
  font-size: .625rem; letter-spacing: .1em; text-transform: uppercase;
  color: var(--obs-muted); font-weight: 600;
  border-bottom: 1px solid var(--obs-border); white-space: nowrap;
}
.obs-table td {
  padding: .8125rem 1.125rem;
  font-size: .8125rem; color: var(--obs-text);
  border-bottom: 1px solid rgba(100,140,255,.07);
}
.obs-table tbody tr:last-child td { border-bottom: none; }
.obs-table tbody tr:hover td { background: rgba(79,140,255,.04); }

/* ── Badges ── */
.badge-obs {
  display: inline-block; padding: .1875rem .625rem; border-radius: 1.25rem;
  font-size: .625rem; font-weight: 700; letter-spacing: .075em; text-transform: uppercase;

.badge-success { background: rgba(52,211,153,.12); color: var(--obs-success); border: 1px solid rgba(52,211,153,.2); }
.badge-danger  { background: rgba(248,113,113,.12); color: var(--obs-danger); border: 1px solid rgba(248,113,113,.2); }
.badge-primary { background: rgba(79,140,255,.12);  color: var(--obs-accent);  border: 1px solid rgba(79,140,255,.2);  }
.badge-purple  { background: rgba(167,139,250,.12); color: var(--obs-purple);  border: 1px solid rgba(167,139,250,.2); }
.badge-gold    { background: rgba(245,200,66,.12);  color: var(--obs-gold);    border: 1px solid rgba(245,200,66,.2);  }

/* ── Modal overrides ── */
.modal-content {
  background: var(--obs-bg3);
  border: 1px solid var(--obs-border2); border-radius: 1rem;
  color: var(--obs-text);

.modal-header { border-bottom-color: var(--obs-border); padding: 1.25rem 1.5rem; }
.modal-footer { border-top-color: var(--obs-border); }
.modal-title { font-family: 'Cinzel', serif; font-size: .9375rem; letter-spacing: .05em; }
.btn-close { filter: invert(1) opacity(.5); }

/* ── Toast ── */
.obs-toast {
  background: rgba(6,10,30,.97);
  border-left: 3px solid var(--obs-accent);
  border-radius: .625rem; padding: .8125rem 1.125rem;
  font-size: .8125rem; color: var(--obs-text);
  min-width: 16rem; box-shadow: 0 8px 40px rgba(10,20,80,.7);
  animation: fadeIn .3s ease;
}
.obs-toast.toast-success { border-left-color: var(--obs-success); }
.obs-toast.toast-error   { border-left-color: var(--obs-danger); }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 3.5rem 1.5rem; }
.empty-state .empty-icon { font-size: 2.5rem; opacity: .35; display: block; margin-bottom: .875rem; }

/* ── Search ── */
.search-input {
  background: rgba(255,255,255,.05); border: 1px solid var(--obs-border);
  border-radius: .5rem; padding: .4375rem .875rem;

  font-family: 'Raleway', sans-serif; width: 12.5rem;
  outline: none; transition: border .2s;

.search-input:focus { border-color: var(--obs-accent); }
.search-input::placeholder { color: var(--obs-dim); }

/* ── Animations ── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(1.25rem); } to { opacity: 1; transform: none; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.page-enter { animation: fadeUp .3s ease; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(79,140,255,.25); border-radius: 3px; }

/* ── Coming soon ── */
.coming-soon {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 20rem; gap: .75rem;

.coming-soon i { font-size: 3rem; opacity: .25; color: var(--obs-muted); }

  background: rgba(79,140,255,.06); border: 1px solid var(--obs-border);
  border-radius: .5rem; padding: .75rem 1rem; font-size: .75rem; color: var(--obs-muted);

(function () {
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize() {
    c.width = innerWidth; c.height = innerHeight;
    stars = Array.from({ length: 220 }, () => ({
      x: Math.random() * c.width, y: Math.random() * c.height,
      r: Math.random() * 1.4 + 0.2,
      a: Math.random(), da: (Math.random() - .5) * .005,
    }));
  }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    for (const s of stars) {
      s.a = Math.max(.05, Math.min(1, s.a + s.da));
      if (s.a <= .05 || s.a >= 1) s.da *= -1;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,220,255,${s.a})`; ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  resize(); draw();
})();

// ════════════════════════════════════════════════════════
// TURNO LOGIC  (Manhã 6-12h · Tarde 12-18h · Noite 18-6h)
// ════════════════════════════════════════════════════════
const TURNOS = {
  MANHA: { label:'Manhã',  badge:'badge-primary' },
  TARDE: { label:'Tarde',  badge:'badge-gold'    },
  NOITE: { label:'Noite',  badge:'badge-purple'  },
};
function getTurno(dataVisita) {
  const h = new Date(dataVisita).getHours();
  if (h >= 6 && h < 12) return 'MANHA';
  if (h >= 12 && h < 18) return 'TARDE';
  return 'NOITE';
}

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
const fmt = (d) => { if (!d) return '–'; const p = String(d).slice(0,10).split('-'); return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : d; };
const fmtDt = (dt) => { if (!dt) return '–'; const d = new Date(dt); const h = String(d.getHours()).padStart(2,'0'); const m = String(d.getMinutes()).padStart(2,'0'); return `${fmt(dt.slice(0,10))} ${h}:${m}`; };
const fmtR$ = (v) => v != null ? `R$ ${Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2})}` : '–';
const getById = (arr, id) => arr.find(x => x.id === id) ?? null;
const getName = (arr, id) => { const o = getById(arr, id); return o ? (o.nome ?? o.titulo ?? '–') : '–'; };
const nextId  = (key) => state._next[key]++;
const fv      = (id) => { const el = document.getElementById(id); return el ? el.value : ''; };
const statusBadge = (v) => v ? '<span class="badge-obs badge-success">Ativo</span>' : '<span class="badge-obs badge-danger">Inativo</span>';
const projetoBadge = (s) => {
  const m = { ativo:'badge-success', concluido:'badge-primary', suspenso:'badge-danger' };
  const l = { ativo:'Ativo', concluido:'Concluído', suspenso:'Suspenso' };
  return `<span class="badge-obs ${m[s]??'badge-danger'}">${l[s]??s}</span>`;
};

// ════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════
function toast(msg, type='info') {
  const icons = { success:'check-circle', error:'x-circle', info:'info-circle' };
  const colors = { success:'var(--obs-success)', error:'var(--obs-danger)', info:'var(--obs-accent)' };
  const el = document.createElement('div');
  el.className = `obs-toast toast-${type}`;
  el.setAttribute('role','alert');
  el.innerHTML = `<i class="bi bi-${icons[type]??'info-circle'} me-2" style="color:${colors[type]}"></i>${msg}`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 3200);
}

// AUTH

let currentUser = null;
let currentPage = 'dashboard';

function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value.trim();
  const errEl = document.getElementById('login-error');

  const all = [
    ...state.coordenadores.map(x => ({...x, tipo:'coordenador'})),
    ...state.pesquisadores.map(x => ({...x, tipo:'pesquisador'})),
    ...state.guias.map(x => ({...x, tipo:'guia'})),
  ];
  const user = all.find(x => x.login === u && x.senha === p && x.status === true);

  if (!user) {
    errEl.textContent = 'Login ou senha inválidos, ou usuário inativo.';
    errEl.classList.remove('d-none');
    return;
  }
  errEl.classList.add('d-none');
  currentUser = user;
  document.getElementById('side-name').textContent = user.nome.split(' ')[0];
  document.getElementById('side-role').textContent = user.tipo.toUpperCase();
  document.getElementById('side-avatar').textContent = user.nome.charAt(0).toUpperCase();
  document.getElementById('login-screen').classList.add('d-none');
  document.getElementById('app').classList.remove('d-none');
  buildNav();
  navigate('dashboard');
}

function doLogout() {
  document.getElementById('login-screen').classList.remove('d-none');
  document.getElementById('app').classList.add('d-none');
  currentUser = null; currentPage = 'dashboard';
}

function buildNav() {
  const items = NAV_CONFIG[currentUser?.tipo] ?? [];
  document.getElementById('sidebar-nav').innerHTML = items.map(item => {
    if (item.section) return `<p class="nav-section-label">${item.section}</p>`;
    return `<button class="sidebar-link" id="nav-${item.id}" onclick="navigate('${item.id}')">
      <i class="bi ${item.icon} link-icon" aria-hidden="true"></i>${item.label}
    </button>`;
  }).join('');
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + page)?.classList.add('active');

  const pages = {
    dashboard:      renderDashboard,
    agendamentos:   () => renderCRUD('agendamentos'),
    caravanas:      () => renderCRUD('caravanas'),
    guias:          () => renderCRUD('guias'),
    constelacoes:   () => renderCRUD('constelacoes'),
    coordenadores:  () => renderCRUD('coordenadores'),
    pesquisadores:  () => renderCRUD('pesquisadores'),
    gruposPesquisa: () => renderCRUD('gruposPesquisa'),
    projetos:       () => renderCRUD('projetos'),
    observacoes:    () => renderCRUD('observacoes'),
  };

  const mc = document.getElementById('main-content');
  mc.innerHTML = pages[page]
    ? `<section class="page-enter">${pages[page]()}</section>`
    : `<section class="page-enter"><div class="coming-soon"><i class="bi bi-tools"></i><p style="color:var(--obs-muted)">Página em desenvolvimento</p></div></section>`;
  mc.scrollTop = 0;
}

          <select id="f-guiaId" class="form-select">

              const t=TURNOS[g.disponibilidade];
              return `<option value="${g.id}" ${r.guiaId===g.id?'selected':''}>${g.nome} — ${t?.label??g.disponibilidade}</option>`;
            }).join('')}

      if (!d.dataVisita||!d.caravanaId||!d.guiaId) return 'Preencha todos os campos obrigatórios.';

      if (guia && guia.disponibilidade !== turno)
        return `Guia "${guia.nome}" disponível no turno ${TURNOS[guia.disponibilidade]?.label}, incompatível com ${TURNOS[turno]?.label}.`;

          <label for="f-constelacaoId" class="form-label">Constelação Observada *</label>
          <select id="f-constelacaoId" class="form-select">
            ${state.constelacoes.map(c=>`<option value="${c.id}" ${r.constelacaoId===c.id?'selected':''}>${c.nome}</option>`).join('')}
          </select>
        </div>
        <div class="col-md-6">
          <label for="f-instrumentoUtilizado" class="form-label">Instrumento Utilizado *</label>
          <input id="f-instrumentoUtilizado" class="form-control" value="${r.instrumentoUtilizado??''}" placeholder="Ex: Telescópio refletor">
        </div>
        <div class="col-12">
          <label for="f-descricao" class="form-label">Descrição Científica *</label>
          <textarea id="f-descricao" class="form-control" rows="3">${r.descricao??''}</textarea>
        </div>
        <div class="col-12">
          <div class="form-note">
            <i class="bi bi-gear-fill me-1"></i>
            <strong>Versão da observação</strong> — preenchida automaticamente pelo sistema (incremento por projeto/constelação)
          </div>
        </div>
      </div>`,
    collect:() => ({
      dataObservacao:fv('f-dataObservacao'),
      projetoId:parseInt(fv('f-projetoId')),
      constelacaoId:parseInt(fv('f-constelacaoId')),
      instrumentoUtilizado:fv('f-instrumentoUtilizado'),
      descricao:fv('f-descricao'),
    }),
    validate:(d,id) => {
      if (!d.dataObservacao||!d.projetoId||!d.constelacaoId||!d.instrumentoUtilizado||!d.descricao) return 'Preencha todos os campos obrigatórios.';
      const proj = getById(state.projetos, d.projetoId);
      if (!proj||proj.status!=='ativo') return 'O projeto deve ter status ativo.';
      if (d.dataObservacao<proj.dataInicio||d.dataObservacao>proj.dataTermino) return 'Data fora do período do projeto.';
      if (state.observacoes.find(o=>o.dataObservacao===d.dataObservacao&&o.projetoId===d.projetoId&&o.constelacaoId===d.constelacaoId&&o.id!==id))
        return 'Já existe observação desta constelação neste dia/projeto.';
      return null;
    },
    beforeSave:(d) => {
      const max = Math.max(0, ...state.observacoes.filter(o=>o.projetoId===d.projetoId&&o.constelacaoId===d.constelacaoId).map(o=>o.versaoObservacao));
      d.versaoObservacao = max + 1;
    },
  },
};

// ════════════════════════════════════════════════════════
// CRUD RENDERER
// ════════════════════════════════════════════════════════
function renderCRUD(key) {
  const cfg  = CRUD[key];
  const data = state[cfg.key];
  const canEdit = currentUser?.tipo === 'coordenador';

  return `
  <header class="page-header">
    <div>
      <h2 class="page-heading"><i class="bi ${cfg.icon} me-2"></i>${cfg.title}</h2>
      <p class="page-sub">Gerenciamento de ${cfg.title.toLowerCase()}</p>
    </div>
    ${canEdit ? `<button class="btn btn-obs btn-obs-primary btn-sm" onclick="openForm('${key}',null)">
      <i class="bi bi-plus-lg me-1"></i>Inserir
    </button>` : ''}
  </header>

  <article class="obs-panel">
    <header class="obs-panel-header">
      <h3 class="obs-panel-title">${cfg.title}</h3>
      <input class="search-input" placeholder="🔍 Buscar…" oninput="filterTable(this,'tbl-${key}')" aria-label="Buscar em ${cfg.title}">
    </header>
    <div style="overflow-x:auto">
      <table class="obs-table" id="tbl-${key}" aria-label="${cfg.title}">
        <thead>
          <tr>
            ${cfg.cols.map(c=>`<th scope="col">${c.h}</th>`).join('')}
            <th scope="col">Ações</th>
          </tr>
        </thead>
        <tbody>
          ${data.length === 0
            ? `<tr><td colspan="${cfg.cols.length+1}"><div class="empty-state"><span class="empty-icon">🔭</span><p style="color:var(--obs-muted)">Nenhum registro encontrado</p></div></td></tr>`
            : data.map(r => `<tr>
                ${cfg.cols.map(c=>`<td>${c.f(r)}</td>`).join('')}
                <td>
                  <div class="d-flex gap-1">
                    <button class="btn btn-obs btn-obs-secondary btn-sm" onclick="openView('${key}',${r.id})" aria-label="Visualizar"><i class="bi bi-eye"></i></button>
                    ${canEdit ? `
                    <button class="btn btn-obs btn-obs-secondary btn-sm" onclick="openForm('${key}',${r.id})" aria-label="Editar"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-obs btn-obs-danger btn-sm" onclick="deleteRecord('${key}',${r.id})" aria-label="Remover"><i class="bi bi-trash3"></i></button>
                    ` : ''}
                  </div>
                </td>
              </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <footer class="panel-footer">Total: <strong style="color:var(--obs-muted)">${data.length}</strong> registro(s)</footer>
  </article>`;
}

function filterTable(inp, tableId) {
  const q = inp.value.toLowerCase();
  document.querySelectorAll(`#${tableId} tbody tr`).forEach(tr => {
    tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

// ════════════════════════════════════════════════════════
// FORM MODAL
// ════════════════════════════════════════════════════════
function openForm(key, id) {
  const cfg  = CRUD[key];
  const r    = id ? getById(state[cfg.key], id) : {};
  const isEdit = !!id;

  document.getElementById('crud-modal')?.remove();
  const div = document.createElement('div');
  div.className = 'modal fade'; div.id = 'crud-modal';
  div.setAttribute('tabindex','-1'); div.setAttribute('aria-modal','true');
  div.setAttribute('role','dialog'); div.setAttribute('aria-labelledby','crud-modal-title');
  div.innerHTML = `
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h4 class="modal-title" id="crud-modal-title">
            <i class="bi ${isEdit?'bi-pencil-square':'bi-plus-circle'} me-2"></i>${isEdit?'Editar':'Inserir'} ${cfg.title}
          </h4>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <form id="crud-form" novalidate onsubmit="event.preventDefault();saveRecord('${key}',${id??'null'})">
            ${cfg.form(r??{})}
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-obs btn-obs-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-obs btn-obs-primary" onclick="saveRecord('${key}',${id??'null'})">
            <i class="bi bi-floppy me-1"></i>Salvar
          </button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(div);
  const modal = new bootstrap.Modal(div);
  div.addEventListener('hidden.bs.modal', () => div.remove());
  modal.show();
}

function saveRecord(key, id) {
  const cfg = CRUD[key];
  const d   = cfg.collect();
  const err = cfg.validate(d, id);
  if (err) { toast(err, 'error'); return; }
  if (cfg.beforeSave) cfg.beforeSave(d);
  if (id) {
    const idx = state[cfg.key].findIndex(x => x.id === id);
    if (idx >= 0) state[cfg.key][idx] = { ...state[cfg.key][idx], ...d };
    toast('Registro atualizado com sucesso!', 'success');
  } else {
    d.id = nextId(cfg.key);
    state[cfg.key].push(d);
    toast('Registro inserido com sucesso!', 'success');
  }
  bootstrap.Modal.getInstance(document.getElementById('crud-modal'))?.hide();
  navigate(currentPage);
}

function deleteRecord(key, id) {
  const cfg = CRUD[key];
  const constraints = {
    caravanas:     () => state.agendamentos.find(a=>a.caravanaId===id)      ? 'Caravana vinculada a agendamento.' : null,
    guias:         () => state.agendamentos.find(a=>a.guiaId===id)          ? 'Guia vinculado a agendamento.' : null,
    constelacoes:  () => state.observacoes.find(o=>o.constelacaoId===id)    ? 'Constelação vinculada a observações.' : null,
    projetos:      () => state.observacoes.find(o=>o.projetoId===id)        ? 'Projeto vinculado a observações.' : null,
    gruposPesquisa:() => state.projetos.find(p=>p.grupoDePesquisaId===id)   ? 'Grupo vinculado a projetos.' : null,
    coordenadores: () => state.projetos.find(p=>p.coordenadorId===id)       ? 'Coordenador vinculado a projetos.' : null,
  };
  const blocked = constraints[key]?.();
  if (blocked) { toast('Remoção bloqueada: ' + blocked, 'error'); return; }
  showConfirm('Remover Registro', 'Esta ação não pode ser desfeita.', () => {
    state[cfg.key] = state[cfg.key].filter(x => x.id !== id);
    toast('Registro removido.', 'success');
    navigate(currentPage);
  });
}

// ════════════════════════════════════════════════════════
// VIEW MODAL
// ════════════════════════════════════════════════════════
function openView(key, id) {
  const cfg = CRUD[key];
  const r   = getById(state[cfg.key], id);
  if (!r) return;

  const SKIP = new Set(['id','senha','funcao']);
  const LABELS = {
    nome:'Nome', cpf:'CPF', telefone:'Telefone', email:'E-mail',
    especialidade:'Especialidade', login:'Login', status:'Status',
    disponibilidade:'Disponibilidade', tipoCaravana:'Tipo',
    instituicao:'Instituição', responsavel:'Responsável',
    quantidadeVisitantes:'Qtd. Visitantes', observacoes:'Observações',
    dataVisita:'Data / Hora', caravanaId:'Caravana', guiaId:'Guia',
    valorVisita:'Valor', dataObservacao:'Data', projetoId:'Projeto',
    constelacaoId:'Constelação', instrumentoUtilizado:'Instrumento',
    versaoObservacao:'Versão', descricao:'Descrição',
    curiosidades:'Curiosidades', hemisferio:'Hemisfério',
    periodoVisibilidade:'Visibilidade', principaisEstrelas:'Principais Estrelas',
    titulo:'Título', dataInicio:'Início', dataTermino:'Término',
    grupoDePesquisaId:'Grupo', coordenadorId:'Coordenador',
    areaDePesquisa:'Área de Pesquisa', pesquisadores:'Pesquisadores',
    dataCriacao:'Data Criação',
  };

  const rows = Object.entries(r).filter(([k]) => !SKIP.has(k)).map(([k, val]) => {
    let disp = val ?? '–';
    if (k==='caravanaId')          disp = getName(state.caravanas, val);
    else if (k==='guiaId')         disp = getName(state.guias, val);
    else if (k==='projetoId')      disp = getName(state.projetos, val);
    else if (k==='constelacaoId')  disp = getName(state.constelacoes, val);
    else if (k==='coordenadorId')  disp = getName(state.coordenadores, val);
    else if (k==='grupoDePesquisaId') disp = getName(state.gruposPesquisa, val);
    else if (k==='pesquisadores'&&Array.isArray(val)) disp = val.map(pid=>getName(state.pesquisadores,pid)).join(', ')||'–';
    else if (k==='dataVisita')     disp = fmtDt(val);
    else if (['dataObservacao','dataInicio','dataTermino','dataCriacao'].includes(k)) disp = fmt(val);
    else if (k==='valorVisita')    disp = fmtR$(val);
    else if (k==='status'&&typeof val==='boolean') disp = val ? 'Ativo' : 'Inativo';
    else if (k==='status'&&typeof val==='string')  disp = {ativo:'Ativo',concluido:'Concluído',suspenso:'Suspenso'}[val]??val;
    else if (k==='disponibilidade') disp = TURNOS[val]?.label ?? val;
    return `<div class="col-md-6">
      <p class="mb-0" style="font-size:.625rem;letter-spacing:.1em;color:var(--obs-dim);text-transform:uppercase">${LABELS[k]??k}</p>
      <p class="mb-0 mt-1" style="font-size:.8125rem;color:var(--obs-text);word-break:break-word">${disp}</p>
    </div>`;
  });

  document.getElementById('view-modal')?.remove();
  const div = document.createElement('div');
  div.className = 'modal fade'; div.id = 'view-modal';
  div.setAttribute('tabindex','-1'); div.setAttribute('aria-modal','true');
  div.setAttribute('role','dialog'); div.setAttribute('aria-labelledby','view-modal-title');
  div.innerHTML = `
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h4 class="modal-title" id="view-modal-title">
            <i class="bi bi-eye me-2"></i>Visualizar — ${cfg.title}
          </h4>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">${rows.join('')}</div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-obs btn-obs-secondary" data-bs-dismiss="modal">Fechar</button>
          ${currentUser?.tipo==='coordenador' ? `<button class="btn btn-obs btn-obs-primary" onclick="bootstrap.Modal.getInstance(document.getElementById('view-modal')).hide();openForm('${key}',${id})"><i class="bi bi-pencil me-1"></i>Editar</button>` : ''}
        </div>
      </div>
    </div>`;
  document.body.appendChild(div);
  const modal = new bootstrap.Modal(div);
  div.addEventListener('hidden.bs.modal', () => div.remove());
  modal.show();
}

// ════════════════════════════════════════════════════════
// CONFIRM DIALOG
// ════════════════════════════════════════════════════════
function showConfirm(title, msg, onConfirm) {
  document.getElementById('confirm-modal')?.remove();
  const div = document.createElement('div');
  div.className = 'modal fade'; div.id = 'confirm-modal';
  div.setAttribute('tabindex','-1'); div.setAttribute('aria-modal','true');
  div.setAttribute('role','alertdialog'); div.setAttribute('aria-labelledby','confirm-title');
  div.innerHTML = `
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content text-center p-2">
        <div class="modal-body">
          <i class="bi bi-exclamation-triangle" style="font-size:2.5rem;color:var(--obs-danger);display:block;margin-bottom:.75rem"></i>
          <h5 id="confirm-title" class="modal-title mb-2">${title}</h5>
          <p style="font-size:.8125rem;color:var(--obs-muted)">${msg}</p>
        </div>
        <div class="modal-footer justify-content-center border-0 pt-0">
          <button class="btn btn-obs btn-obs-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
          <button id="confirm-yes" class="btn btn-obs btn-obs-danger btn-sm">Confirmar</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(div);
  const modal = new bootstrap.Modal(div);
  div.addEventListener('hidden.bs.modal', () => div.remove());
  div.querySelector('#confirm-yes').addEventListener('click', () => { modal.hide(); onConfirm(); });
  modal.show();
}
</script>
